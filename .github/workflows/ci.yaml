name: quality-assurance-checks

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          sudo apt-get update -
          sudo apt-get install --no-install-recommends -y \
                   appstream \
                   appstream-util \
                   desktop-file-utils \
                   gettext \
                   libcairo2-dev \
                   libglib2.0-dev \
                   libgirepository1.0-dev \
                   ninja-build

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.4
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached virtual environment
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Optionally install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root --with=dev

      - name: Run quality assurance checks
        run: |
          poetry run pre-commit run -a

      - name: Run automatic tests
        run: |
          poetry run python -m unittest discover tests/

      - name: Validate meta information
        run: |
          poetry run meson setup --wipe builddir
          poetry run meson test --verbose -C builddir
